server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets are fingerprinted by Vite — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: every unknown path falls back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy: /api/<x> -> http://backend:8000/<x>
    # The trailing slash on proxy_pass strips the /api/ prefix.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
