- id: la-matvec-001
  difficulty: basic
  tags: [matrix-multiplication, dimensions]
  question: |
    若 A 是 m x n matrix，B 是 n x p matrix，則 AB 的尺寸為何？
  options:
    - "m x p"
    - "n x n"
    - "p x m"
    - "m x n"
  answer: 0
  explanation: |
    Matrix multiplication 要求 A 的欄數等於 B 的列數。結果保留 A 的列數與 B 的欄數，所以 AB 是 m x p。
- id: la-matvec-002
  difficulty: basic
  tags: [rank, row-reduction]
  question: |
    一個 matrix 的 rank 最直接對應到 row echelon form 中的哪個量？
  options:
    - "零列的數量"
    - "pivot columns 的數量"
    - "所有 entry 的總和"
    - "主對角線 entry 的乘積"
  answer: 1
  explanation: |
    Rank 是 column space 的維度，也等於 row reduction 後 pivot columns 的數量。
- id: la-matvec-003
  difficulty: basic
  tags: [linear-independence, vector-spaces]
  question: |
    向量 v1, v2, v3 在同一個 vector space 中。下列哪個條件等價於它們 linearly independent？
  options:
    - "v1 + v2 + v3 一定不是 zero vector"
    - "三個向量的長度都相同"
    - "c1v1 + c2v2 + c3v3 = 0 只有 c1 = c2 = c3 = 0 的解"
    - "任兩個向量的 dot product 都是 0"
  answer: 2
  explanation: |
    Linear independence 的定義就是只有 trivial linear combination 能得到 zero vector。其他條件不是必要條件。
- id: la-matvec-004
  difficulty: basic
  tags: [determinant, invertibility]
  question: |
    對一個 n x n square matrix A，下列哪個敘述能保證 A invertible？
  options:
    - "A 的所有 entry 都是正數"
    - "A 的每一列加總都相同"
    - "A 至少有一個 zero entry"
    - "det(A) 不等於 0"
  answer: 3
  explanation: |
    Square matrix 可逆若且唯若 determinant 非零。Entry 是否為正或列加總是否相同都不能保證可逆。
- id: la-matvec-005
  difficulty: basic
  tags: [span, basis]
  question: |
    在 R^2 中，兩個 nonzero vectors 若不互為 scalar multiple，則它們的 span 是什麼？
  options:
    - "整個 R^2"
    - "只有一條通過原點的線"
    - "只有這兩個向量本身"
    - "空集合"
  answer: 0
  explanation: |
    在 R^2 中，兩個不共線的 nonzero vectors linearly independent，因此形成 R^2 的一組 basis，其 span 是整個 R^2。
- id: la-matvec-006
  difficulty: intermediate
  tags: [rank-nullity, linear-map]
  question: |
    線性映射 T: R^5 -> R^3 的 rank 為 3。根據 rank-nullity theorem，nullity(T) 是多少？
  options:
    - "0"
    - "2"
    - "3"
    - "5"
  answer: 1
  explanation: |
    Rank-nullity theorem 給出 dim(domain) = rank + nullity。這裡 5 = 3 + nullity，所以 nullity = 2。
- id: la-matvec-007
  difficulty: intermediate
  tags: [basis, coordinates]
  question: |
    在 R^2 中令 basis B = {(1, 0), (1, 1)}。向量 (3, 2) 在 B 下的 coordinates 是什麼？
  options:
    - "(2, 1)"
    - "(3, 2)"
    - "(1, 2)"
    - "(5, 2)"
  answer: 2
  explanation: |
    設 (3,2) = a(1,0) + b(1,1) = (a+b, b)。由 b = 2、a+b = 3 得 a = 1，所以 coordinates 是 (1,2)。
- id: la-matvec-008
  difficulty: intermediate
  tags: [eigenvalues, eigenvectors]
  question: |
    對 matrix A = [[2, 0], [0, 3]]，向量 (0, 1) 對應的 eigenvalue 是多少？
  options:
    - "0"
    - "1"
    - "2"
    - "3"
  answer: 3
  explanation: |
    A(0,1) = (0,3) = 3(0,1)，所以 (0,1) 是 eigenvector，對應 eigenvalue 3。
- id: la-matvec-009
  difficulty: intermediate
  tags: [row-space, null-space, orthogonality]
  question: |
    對任意 matrix A，下列哪個關係一定成立？
  options:
    - "A 的 row space 與 null space 互相 orthogonal"
    - "A 的 column space 與 null space 是同一個空間"
    - "A 的 row space 一定等於整個 R^m"
    - "A 的 null space 一定只有 zero vector"
  answer: 0
  explanation: |
    Ax = 0 代表 x 與 A 的每一個 row 的 dot product 都是 0，因此 null space 中的向量與 row space 正交。
- id: la-matvec-010
  difficulty: intermediate
  tags: [projection, orthogonality]
  question: |
    向量 (3, 4) orthogonal projection 到 x-axis 上的結果是什麼？
  options:
    - "(0, 4)"
    - "(3, 0)"
    - "(3, 4)"
    - "(4, 3)"
  answer: 1
  explanation: |
    Projection 到 x-axis 會保留 x 分量並把 y 分量歸零，因此結果是 (3,0)。
- id: la-matvec-011
  difficulty: intermediate
  tags: [linear-transformations, matrix-composition]
  question: |
    若 T 的 matrix 是 A，S 的 matrix 是 B，且 composition S∘T 有定義，則 S∘T 的 matrix 是什麼？
  options:
    - "AB"
    - "A + B"
    - "BA"
    - "A^T B"
  answer: 2
  explanation: |
    Composition S∘T 表示先套用 T，再套用 S。若 T(x)=Ax 且 S(y)=By，則 S(T(x)) = B(Ax) = (BA)x。
- id: la-matvec-012
  difficulty: intermediate
  tags: [subspaces, closure]
  question: |
    下列哪一個集合是 R^3 的 subspace？
  options:
    - "{(x, y, z) | x + y - z = 1}"
    - "{(x, y, z) | x >= 0}"
    - "{(x, y, z) | x^2 + y^2 + z^2 = 1}"
    - "{(x, y, z) | x + y - z = 0}"
  answer: 3
  explanation: |
    方程 x + y - z = 0 是 homogeneous linear equation，其解集合包含 zero vector 且對加法與 scalar multiplication 封閉，因此是 subspace。
- id: la-matvec-013
  difficulty: advanced
  tags: [diagonalization, eigenvectors]
  question: |
    一個 n x n matrix A 可 diagonalizable 的充分且必要條件是哪一個？
  options:
    - "A 有 n 個 linearly independent eigenvectors"
    - "A 的所有 entry 都不為 0"
    - "A 的 determinant 等於 trace"
    - "A 至少有一個 eigenvalue"
  answer: 0
  explanation: |
    A 可 diagonalizable 若且唯若存在由 n 個 linearly independent eigenvectors 組成的 basis，使 A 在該 basis 下成為 diagonal matrix。
- id: la-matvec-014
  difficulty: advanced
  tags: [rank, matrix-product]
  question: |
    對可相乘的 matrices A 與 B，下列哪個 rank inequality 一定成立？
  options:
    - "rank(AB) >= rank(A) + rank(B)"
    - "rank(AB) <= min(rank(A), rank(B))"
    - "rank(AB) = rank(A)rank(B)"
    - "rank(AB) 一定等於 B 的欄數"
  answer: 1
  explanation: |
    AB 的 column space 受 A 的 column space 限制，也受 B 經轉換後可提供的獨立方向限制，因此 rank(AB) 不會超過 rank(A) 或 rank(B)。
- id: la-matvec-015
  difficulty: advanced
  tags: [change-of-basis, coordinates]
  question: |
    若 matrix P 的 columns 是 basis B 的向量，且都用 standard coordinates 表示，則向量 v 的 standard coordinates 與 B-coordinates 的關係是什麼？
  options:
    - "[v]_B = P[v]_standard"
    - "[v]_standard = P^T[v]_B 一定成立"
    - "[v]_standard = P[v]_B"
    - "[v]_B = P^T[v]_standard 一定成立"
  answer: 2
  explanation: |
    P 的每一欄是 basis vector。用 [v]_B 的係數線性組合這些欄向量，就得到 v 在 standard basis 下的 coordinates，因此 [v]_standard = P[v]_B。
